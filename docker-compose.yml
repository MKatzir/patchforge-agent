services:
  agent-workspace:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      tools:
        condition: service_healthy
    volumes:
      - .:/app
      - ./backups/opencode_auth_backup:/root/.local/share/opencode
      - ./backups/opencode_config_backup:/root/.config/opencode
    env_file:
      - .env
    tty: true
    stdin_open: true

  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: patch-tools:latest
    container_name: patch-tools
    ports:
      - '8080:8000'
    volumes:
      - ./binaries:/work/binaries
      - ./output:/work/output
      - ./cache:/work/cache
      - ./ghidra_projects:/opt/ghidra/projects
      - ./:/opt/patch-tools:ro 
    environment:
      GHIDRA_INSTALL_DIR: /opt/ghidra
      WORK_DIR: /work
      MAX_GHIDRA_JOBS: '1'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'